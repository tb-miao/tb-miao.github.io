<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./nav-images/icon.jpg">
    <title>TB-miao导航网站</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            color: #333;
            margin: 0;
            padding: 0;
            text-align: center;
            background-image: linear-gradient(to bottom right, #e0f7fa, #ffebee); /* 渐变背景 */
        }
        header {
            background: url('https://example.com/your-background-image.jpg') no-repeat center center/cover;
            padding: 50px 0;
            color: white;
            border-bottom: 5px solid #ff69b4; /* 底部边框 */
        }
        h1 {
            font-size: 3.5em; /* 增大字体 */
            margin: 0;
            color: #ff69b4; /* 文字颜色 */
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.7); /* 更强的文字阴影 */
            font-family: 'Comic Sans MS', cursive, sans-serif; /* 字体样式 */
            letter-spacing: 3px; /* 字母间距 */
            transition: transform 0.3s, color 0.3s; /* 动画效果 */
        }
        h1:hover {
            transform: scale(1.1); /* 鼠标悬停时放大 */
            color: #ff1493; /* 鼠标悬停时颜色变化 */
        }
        nav {
            margin: 20px 0;
        }
        nav a {
            display: inline-block;
            margin: 10px 20px;
            padding: 15px 25px;
            background-color: #ff69b4;
            color: white;
            text-decoration: none;
            border-radius: 10px; /* 圆角更大 */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); /* 添加阴影 */
            transition: background-color 0.3s, transform 0.3s; /* 动画效果 */
        }
        nav a:hover {
            background-color: #ff1493;
            transform: translateY(-2px); /* 鼠标悬停时上移 */
        }
        footer {
            margin-top: 50px;
            padding: 20px 0;
            background-color: #ff69b4;
            color: white;
            border-top: 5px solid #ff1493; /* 顶部边框 */
        }
        footer p {
            margin: 0; /* 去掉默认边距 */
        }
    </style>
</head>
<body>

<header>
    <h1>TB-miao导航网站</h1>
</header>

<nav>
    <a href="/" target="_blank">正在开发中...</a>
</nav>

<footer>
    <p>&copy; 2024-2025 tb-miao导航网站. MIT 所有权利.</p>
</footer>

</body>
</html>
